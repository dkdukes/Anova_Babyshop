<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Items</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="max-w-6xl mx-auto bg-gray-100 px-4 py-6">

    <div class="flex flex-col md:flex-row gap-6">

       
        <div class="bg-white border rounded-lg shadow-lg p-4 w-full md:w-2/3">

           
            <div class="grid grid-cols-5 font-semibold text-sm mb-2">
                <div>TITLE</div>
                <div>PRICE</div>
                <div>QUANTITY</div>
                <div>SUB-TOTAL</div>
                <div>ACTION</div>
            </div>

            <hr class="mb-4">

           
            <div class="products space-y-4"></div>
        </div>

       
        <div class="checkout bg-white border rounded-lg shadow-lg p-4 w-full md:w-1/3">
           
        </div>

    </div>

    <script src="product.js"></script>
</body>

</html>
