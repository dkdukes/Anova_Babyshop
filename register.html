<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">

            <!-- Logo -->
            <a href="index.html" class="flex items-center">
                <img src="Assets/images/Anova1.png" class="h-10 sm:h-12 md:h-14 lg:h-20 w-auto object-contain"
                    alt="Anova Baby Shop Logo">
            </a>

            <!-- Links -->
            <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Home</a>
                <a href="shop.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Shop</a>
                <a href="about.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">About Us</a>
                <a href="contact.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Contact Us</a>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-4">
                <a href="login.html"
                    class="hidden md:block text-sm hover:bg-gray-600 hover:text-white px-3 py-2 rounded">
                    Sign In
                </a>

                <button class="relative text-xl" id="btnItems">
                    🛒
                    <span id="counter"
                        class="absolute -top-2 -right-2 bg-black text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">
                        0
                    </span>
                </button>
            </div>

        </nav>
    </header>
    <main class="min-h-[80vh] flex items-center justify-center px-4">

        <div class="w-full max-w-md bg-white border border-gray-200 shadow-xl rounded-2xl p-8">

            <!-- Title -->
            <h2 class="text-3xl font-bold text-center mb-2">Create Account</h2>
            <p class="text-center text-gray-500 text-sm mb-6">
                Join Anova Babyshop today
            </p>

            <!-- Form -->
            <form id="registerForm" class="space-y-5">

                <!-- Name -->
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex flex-col w-full">
                        <label class="text-sm mb-1">First Name</label>
                        <input type="text" id="fname" placeholder="John" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-black focus:outline-none transition">
                    </div>

                    <div class="flex flex-col w-full">
                        <label class="text-sm mb-1">Last Name</label>
                        <input type="text" id="lname" placeholder="Doe" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-black focus:outline-none transition">
                    </div>
                </div>

                <!-- Email -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-black focus:outline-none transition">
                </div>

                <!-- Password -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1">Password</label>
                    <input type="password" id="pass" placeholder="••••••••" minlength="6" required
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-black focus:outline-none transition">
                    <span class="text-xs text-gray-400 mt-1">Minimum 8 characters</span>
                </div>

                <!-- Button -->
                <button type="submit" id="register"
                    class="w-full py-3 text-lg font-semibold bg-black text-white rounded-lg hover:bg-gray-800 transition duration-200">
                    Create Account
                </button>
            </form>

            <!-- Message -->
            <div id="message" class="mt-5"></div>

            <!-- Login Link -->
            <p class="text-center text-sm mt-6 text-gray-600">
                Already have an account?
                <a href="login.html" class="text-black font-medium hover:underline">
                    Login
                </a>
            </p>

        </div>

    </main>
    <footer class="bg-white text-center py-6 mt-10">
        <p class="text-sm text-gray-500">
            © 2026 Anova Babyshop
        </p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
