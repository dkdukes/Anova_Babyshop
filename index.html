<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anova Baby Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">

            <!-- Logo -->
            <a href="index.html" class="flex items-center">
                <img src="Assets/images/Anova1.png" class="h-10 sm:h-12 md:h-14 lg:h-20 w-auto object-contain"
                    alt="Anova Baby Shop Logo">
            </a>

            <!-- Links -->
            <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Home</a>
                <a href="shop.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Shop</a>
                <a href="about.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">About Us</a>
                <a href="contact.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Contact Us</a>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-4">
                <a href="login.html"
                    class="hidden md:block text-sm hover:bg-gray-600 hover:text-white px-3 py-2 rounded">
                    Sign In
                </a>

                <button class="relative text-xl" id="btnItems">
                    🛒
                    <span id="counter"
                        class="absolute -top-2 -right-2 bg-black text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">
                        0
                    </span>
                </button>
            </div>

        </nav>
    </header>
    <main class="">
        <!-- Hero section -->
        <section class="bg-gradient-to-r from-gray-50 to-gray-200 py-10 px-4 md:px-12">
            <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-8 items-center">

                <!-- Text -->
                <div>
                    <h1 class="text-3xl md:text-5xl font-extrabold leading-tight mb-3">
                        Soft & Safe <br>
                        <span class="text-gray-700">Baby Essentials</span>
                    </h1>

                    <p class="text-gray-600 mb-5 text-base">
                        Discover premium baby products designed for comfort and safety.
                    </p>

                    <div class="flex gap-3">
                        <button onclick="window.location.href='shop.html'"
                            class="bg-black text-white px-5 py-2.5 rounded-lg hover:bg-gray-800 transition">
                            Shop Now
                        </button>

                        <button onclick="window.location.href='about.html'"
                            class="border border-gray-300 px-5 py-2.5 rounded-lg hover:bg-gray-100 transition">
                            Learn More
                        </button>
                    </div>
                </div>

                <!-- Image -->
                <div class="relative w-full h-[60vh] max-h-[420px]">
                    <img src="Assets/images/baby1.avif"
                        class="rounded-2xl w-full h-full object-cover object-top shadow-lg">

                    <div class="absolute bottom-4 left-4 bg-white shadow px-4 py-2 rounded text-sm">
                        Trusted by parents
                    </div>
                </div>

            </div>
        </section>
        <!-- Categories Section -->
        <section class="py-16 px-4 md:px-12">
            <h2 class="text-2xl font-bold mb-8 text-center">Featured Products</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="apparel">
                    <img src="Assets/categories/12-300x300-1-1-1.jpg.webp" alt="Baby Image" class="mb-4 rounded-md">
                    <h1 class="font-semibold">Apparels & Accessories</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="gear">
                    <img src="Assets/categories/baby-gear-1.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Gear</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="toys">
                    <img src="Assets/categories/baby-toys.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Toys</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="nursery">
                    <img src="Assets/categories/nursery.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Nursery</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="feeding">
                    <img src="Assets/categories/nursing.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Nursing</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="transport">
                    <img src="Assets/categories/transport.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Transport</h1>
                </div>
            </div>
        </section>

    </main>
    <footer class="bg-white text-center py-6 mt-10">
        <p class="text-sm text-gray-500">
            © 2026 Anova Babyshop
        </p>
    </footer>
    <script src="index.js"></script>
</body>

</html>
