<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anova Baby Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold">Anova Babyshop</a>
            <div class="md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:text-gray-600">Home</a>
                <a href="shop.html" class="hover:text-gray-600 font-semibold">Shop</a>
                <a href="about.html" class="hover:text-gray-600">About Us</a>
                <a href="contact.html" class="hover:text-gray-600">Contact Us</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="login.html" class="hidden md:block text-sm hover:text-gray-600">Sign In</a>
                <button class="relative text-lg" id="btnItems">
                    🛒
                    <span class="absolute -top-2 -right-3 bg-black text-white text-xs px-1.5 rounded-full"
                        id="counter">0</span>
                </button>
            </div>


        </nav>
    </header>
    <main class="">
        <!-- Hero section -->
        <section class="bg-gray-100 py-16 px-4 md:px-12">
            <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10 items-center">
                <div>
                    <h1 class="text-3xl md:text-5xl font-bold mb-4">
                        Soft & Safe Baby Essentials
                    </h1>
                    <p class="text-gray-600 mb-6">
                        Quality products designed for comfort, safety, and everyday parenting.
                    </p>
                    <button onclick="window.location.href='shop.html'"
                        class="bg-black text-white px-6 py-3 rounded-md hover:bg-gray-800">
                        Shop Now
                    </button>
                </div>
                <div>
                    <img src="Assets/images/baby1.avif" class="rounded-lg w-full object-cover">
                </div>
            </div>
        </section>
        <!-- Categories Section -->
        <section class="py-16 px-4 md:px-12">
            <h2 class="text-2xl font-bold mb-8 text-center">Featured Products</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="apparel">
                    <img src="Assets/categories/12-300x300-1-1-1.jpg.webp" alt="Baby Image" class="mb-4 rounded-md">
                    <h1 class="font-semibold">Apparels & Accessories</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="gear">
                    <img src="Assets/categories/baby-gear-1.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Gear</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="toys">
                    <img src="Assets/categories/baby-toys.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Toys</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="nursery">
                    <img src="Assets/categories/nursery.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Nursery</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="feeding">
                    <img src="Assets/categories/nursing.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Nursing</h1>
                </div>
                <div class="category border p-4 rounded-lg hover:shadow-md cursor-pointer" id="transport">
                    <img src="Assets/categories/transport.webp" alt="Baby Image" class="rounded-md mb-4">
                    <h1 class="font-semibold">Baby Transport</h1>
                </div>
            </div>
        </section>
       
    </main>
    <footer class="bg-white text-center py-6 mt-10">
        <p class="text-sm text-gray-500">
            © 2026 Anova Babyshop
        </p>
    </footer>
    <script src="index.js"></script>
</body>

</html>
