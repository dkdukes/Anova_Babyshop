<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Selected</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">

            <!-- Logo -->
            <a href="index.html" class="flex items-center">
                <img src="Assets/images/Anova1.png" class="h-10 sm:h-12 md:h-14 lg:h-20 w-auto object-contain"
                    alt="Anova Baby Shop Logo">
            </a>

            <!-- Links -->
            <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Home</a>
                <a href="shop.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Shop</a>
                <a href="about.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">About Us</a>
                <a href="contact.html" class="hover:bg-gray-600 hover:text-white px-3 py-2 rounded">Contact Us</a>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-4">
                <a href="login.html"
                    class="hidden md:block text-sm hover:bg-gray-600 hover:text-white px-3 py-2 rounded">
                    Sign In
                </a>

                <button class="relative text-xl" id="btnItems">
                    🛒
                    <span id="counter"
                        class="absolute -top-2 -right-2 bg-black text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">
                        0
                    </span>
                </button>
            </div>

        </nav>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row gap-10 items-start">

           
            <div class="image w-full md:w-1/2 h-[400px] bg-gray-100 rounded-lg flex items-center justify-center"></div>

            
            <div class="w-full md:w-1/2 space-y-6">

                <div class="details space-y-4"></div>

                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3 border rounded-lg px-3 py-2">
                        <button id="btnMinus">−</button>
                        <span id="btnValue">1</span>
                        <button id="btnPlus">+</button>
                    </div>

                    <button id="btnCart"
                        class="bg-orange-400 text-white px-6 py-2 rounded-lg hover:bg-orange-500 transition">
                        Add to Cart
                    </button>
                </div>

            </div>

        </div>
    </main>
    <footer class="bg-white text-center py-6 mt-10">
        <p class="text-sm text-gray-500">
            © 2026 Anova Babyshop
        </p>
    </footer>
    <script src="cloth.js"></script>
</body>

</html>
