<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Selected</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold">Anova Babyshop</a>
            <div class="md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:text-gray-600">Home</a>
                <a href="shop.html" class="hover:text-gray-600 font-semibold">Shop</a>
                <a href="about.html" class="hover:text-gray-600">About Us</a>
                <a href="contact.html" class="hover:text-gray-600">Contact Us</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="login.html" class="hidden md:block text-sm hover:text-gray-600">Sign In</a>
                <button class="relative text-lg" id="btnItems">
                    🛒
                    <span class="absolute -top-2 -right-3 bg-black text-white text-xs px-1.5 rounded-full"
                        id="counter">0</span>
                </button>
            </div>


        </nav>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row gap-10 items-start">

           
            <div class="image w-full md:w-1/2 h-[400px] bg-gray-100 rounded-lg flex items-center justify-center"></div>

            
            <div class="w-full md:w-1/2 space-y-6">

                <div class="details space-y-4"></div>

                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3 border rounded-lg px-3 py-2">
                        <button id="btnMinus">−</button>
                        <span id="btnValue">1</span>
                        <button id="btnPlus">+</button>
                    </div>

                    <button id="btnCart"
                        class="bg-orange-400 text-white px-6 py-2 rounded-lg hover:bg-orange-500 transition">
                        Add to Cart
                    </button>
                </div>

            </div>

        </div>
    </main>
    <footer class="bg-white text-center py-6 mt-10">
        <p class="text-sm text-gray-500">
            © 2026 Anova Babyshop
        </p>
    </footer>
    <script src="cloth.js"></script>
</body>

</html>
