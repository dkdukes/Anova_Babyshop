<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Selected</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="max-w-6xl mx-auto px-4 py-15 bg-white border-lg shadow-lg rounded-lg mt-2 mb-4">
        <nav class="flex items-center justify-between ">
            <div class="basis-2/6">Anova Baby Shop</div>
            <div class="flex items-center gap-2 basis-3/6 px-2">
                <div><a href="index.html">Home</a></div>
                <div><a href="shop.html">Shop</a></div>
                <div><a href="about.html">About US</a></div>
                <div><a href="contact.html">Contact Us</a></div>
            </div>
            <div class="basis-1/6"><a href="login.html">Sign In</a></div>
             <div class="flex gap-1 basis-1/6">
               <a href="product.html">
                <button class="flex gap-1 cursor-pointer" id="btnItems"> 
                    <div>Cart</div>
                <div id="counter">0</div>
            </button>
            </div>
        </nav>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-2">
        <div class="flex gap-4">
            <div class="image "></div>
            <div>
                <div class="details"></div>
                <div class="flex gap-4">
                    <div class="flex gap-2 ml-20">
                        <div class="bg-cyan-200 rounded-full px-3 py-2 cursor-pointer" id="btnMinus">-</div>
                        <div class="text-center px-3 py-2" id="btnValue">1</div>
                        <div class="bg-cyan-200 rounded-full px-3 py-2 mr-10 cursor-pointer" id="btnPlus">+</div>
                    </div>
                    <div  class="bg-orange-300 px-10 py-2 rounded-sm border-lg hover:bg-orange-400">
                        <button id="btnCart">Add to Cart</button>
                    </div>
                </div>


            </div>

        </div>
    </main>
    <footer class="max-w-6xl mx-auto px-3 py-10 bg-black border-lg shadow-lg rounded-lg text-white text-center mb-4">
        <p>&copy; Anova Baby Shop 2026. All Rights Reserved</p>
    </footer>
    <script src="cloth.js"></script>
</body>

</html>
