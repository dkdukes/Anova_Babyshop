<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Selected</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold">Anova Babyshop</a>
            <div class="md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:text-gray-600">Home</a>
                <a href="shop.html" class="hover:text-gray-600 font-semibold">Shop</a>
                <a href="about.html" class="hover:text-gray-600">About Us</a>
                <a href="contact.html" class="hover:text-gray-600">Contact Us</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="login.html" class="hidden md:block text-sm hover:text-gray-600">Sign In</a>
                <button class="relative text-lg">
                    🛒
                    <span class="absolute -top-2 -right-3 bg-black text-white text-xs px-1.5 rounded-full"
                        id="counter">0</span>
                </button>
            </div>


        </nav>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-2">
        <div class="flex gap-4">
            <div class="image "></div>
            <div>
                <div class="details"></div>
                <div class="flex gap-4">
                    <div class="flex gap-2 ml-20">
                        <div class="bg-cyan-200 rounded-full px-3 py-2 cursor-pointer" id="btnMinus">-</div>
                        <div class="text-center px-3 py-2" id="btnValue">1</div>
                        <div class="bg-cyan-200 rounded-full px-3 py-2 mr-10 cursor-pointer" id="btnPlus">+</div>
                    </div>
                    <div  class="bg-orange-300 px-10 py-2 rounded-sm border-lg hover:bg-orange-400">
                        <button id="btnCart">Add to Cart</button>
                    </div>
                </div>


            </div>

        </div>
    </main>
      <footer class="bg-white text-center py-6 mt-10">
  <p class="text-sm text-gray-500">
    © 2026 Anova Babyshop
  </p>
</footer>
    <script src="cloth.js"></script>
</body>

</html>
