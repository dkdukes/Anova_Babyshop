<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold">Anova Babyshop</a>
            <div class="md:flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:text-gray-600">Home</a>
                <a href="shop.html" class="hover:text-gray-600 font-semibold">Shop</a>
                <a href="about.html" class="hover:text-gray-600">About Us</a>
                <a href="contact.html" class="hover:text-gray-600">Contact Us</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="login.html" class="hidden md:block text-sm hover:text-gray-600">Sign In</a>
                <button class="relative text-lg">
                    🛒
                    <span class="absolute -top-2 -right-3 bg-black text-white text-xs px-1.5 rounded-full"
                        id="counter">0</span>
                </button>
            </div>


        </nav>
    </header>
    <main class="max-w-xl mx-auto mt-30 border-md shadow-lg rounded-lg bg-white px-6 py-4 mb-4">
        <form action="">
            <div class="text-2xl text-center font-semibold font-serif mb-4">Login</div>
            <div class="flex flex-col gap-3">
                <input type="email" name="email" id="email" placeholder="Email Address" required
                    class="border px-3 py-2 mb-4 rounded-lg">
                <input type="password" name="pass" id="pass" placeholder="Password" required
                    class="border px-3 py-2 mb-4 rounded-lg">
            </div>
        </form>
        <button
            class="w-full py-2 text-center text-2xl font-semibold font-serif bg-blue-300 text-white rounded-md mb-4" id="login">Login</button>
        <div>Don't have an account?<a href="register.html">Register</a></div>
        <p class="message"></p>
    </main>
     <footer class="bg-white text-center py-6 mt-10">
  <p class="text-sm text-gray-500">
    © 2026 Anova Babyshop
  </p>
</footer>
    <script src="login.js"></script>
</body>

</html>
